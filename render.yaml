services:
  - type: web
    name: sales-dashboard-api
    env: node
    region: us-west
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DB_USER
        scope: all
      - key: DB_PASSWORD
        scope: all
      - key: DB_HOST
        scope: all
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: sales_dashboard
      - key: NODE_ENV
        value: production

  - type: web
    name: sales-dashboard-frontend
    env: node
    region: us-west
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: sales-dashboard-api
          property: url
