services:
  # Backend API Service
  - type: web
    name: sales-dashboard-api
    env: node
    repo: https://github.com/yourusername/sales-dashboard.git
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        value: https://edzwdxzdogttgrurgnwx.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkendkeHpkb2d0dGdydXJnbnd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDAxOTAsImV4cCI6MjA4NzMxNjE5MH0.GTznRRptYxmU-qSYdKfWMDOgkA90LolNZ1GSx6RQUwI
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: sales-dashboard-frontend
    env: static
    repo: https://github.com/yourusername/sales-dashboard.git
    rootDir: frontend/build
    buildCommand: npm install && npm run build
    staticPublishPath: .
    envVars:
      - key: REACT_APP_API_URL
        value: https://sales-dashboard-api.onrender.com
        sync: false
